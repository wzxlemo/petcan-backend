# Render 部署配置文件
# Render 会读取这个文件自动配置服务

services:
  - type: web
    name: petcan-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOVART_API_KEY
        sync: false  # 在 Render 后台手动设置
      - key: LOVART_BASE_URL
        value: https://api.lovart.pro
